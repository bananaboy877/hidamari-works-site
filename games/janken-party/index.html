    container.appendChild(scoreDiv);

    // スロットマシンフレーム
    const slotFrame = document.createElement('div');
    slotFrame.style.cssText = 'display:flex;gap:24px;background:linear-gradient(180deg,#fff8e1,#ffe0b2);border:8px solid #c07040;border-radius:30px;padding:30px 40px;box-shadow:0 8px 32px rgba(0,0,0,0.15);';

    // 各リールの窓 + リール表示（上から下に流れるタイプ）
    const REEL_ITEM_H = 120; // 1絵柄の高さ
    const VISIBLE_ITEMS = 3; // 表示する絵柄数（上・中央・下）
    const REEL_WINDOW_H = REEL_ITEM_H * VISIBLE_ITEMS; // 窓の高さ
    const reelDisplays = [];
    const reelWindows = [];
    const reelStrips = [];
    for (let i = 0; i < 3; i++) {
      const reelCol = document.createElement('div');
      reelCol.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px;';

      // ボタンラベル
      const keyNames = ['Aボタン(グー)', 'Sボタン(チョキ)', 'Dボタン(パー)'];
      const keyColors = ['#e53935', '#fbc02d', '#1e88e5'];
      const keyLabel = document.createElement('div');
      keyLabel.style.cssText = 'font-size:28px;font-weight:900;color:' + keyColors[i] + ';';
      keyLabel.textContent = keyNames[i];
      reelCol.appendChild(keyLabel);

      // リール窓（クリッピング）
      const reelWindow = document.createElement('div');
      reelWindow.style.cssText = 'width:160px;height:' + REEL_WINDOW_H + 'px;background:#fff;border:5px solid #8d6e63;border-radius:20px;overflow:hidden;position:relative;';

      // 中央判定ラインのハイライト
      const judgeBand = document.createElement('div');
      judgeBand.style.cssText = 'position:absolute;top:' + REEL_ITEM_H + 'px;left:0;width:100%;height:' + REEL_ITEM_H + 'px;background:rgba(255,215,0,0.15);border-top:3px solid #ffd700;border-bottom:3px solid #ffd700;z-index:2;pointer-events:none;';
      reelWindow.appendChild(judgeBand);

      // リールストリップ（絵柄を繰り返し並べた帯）
      const strip = document.createElement('div');
      strip.style.cssText = 'position:absolute;left:0;width:100%;';
      // 絵柄を3周分並べる（スムーズなループ用）
      let stripHTML = '';
      for (let rep = 0; rep < 3; rep++) {
        for (let s = 0; s < SYMBOLS.length; s++) {
          stripHTML += '<div style="width:100%;height:' + REEL_ITEM_H + 'px;display:flex;align-items:center;justify-content:center;font-size:80px;line-height:1;">' + SYMBOLS[s] + '</div>';
        }
      }
      strip.innerHTML = stripHTML;
      reelWindow.appendChild(strip);
      reelCol.appendChild(reelWindow);

      // 停止状態テキスト
      const stopLabel = document.createElement('div');
      stopLabel.style.cssText = 'font-size:28px;font-weight:700;min-height:40px;color:#43a047;';
      stopLabel.textContent = '';
      reelCol.appendChild(stopLabel);

      slotFrame.appendChild(reelCol);
      reelDisplays.push(null); // 互換性のため残す
      reelStrips.push(strip);
      reelWindows.push({ strip: strip, label: stopLabel, window: reelWindow });
    }

    container.appendChild(slotFrame);

    // 結果表示
    const resultDiv = document.createElement('div');
    resultDiv.style.cssText = 'font-size:44px;font-weight:900;color:#c07040;min-height:60px;margin-top:20px;text-align:center;';
    resultDiv.textContent = '';
    container.appendChild(resultDiv);

    // 説明テキスト
    const helpDiv = document.createElement('div');
    helpDiv.style.cssText = 'position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;color:#3a2a1a;text-align:center;z-index:10;width:100%;';
    helpDiv.textContent = '';
    container.appendChild(helpDiv);

    gameArea.appendChild(container);

    // --- リール位置管理 ---
    const reelPositions = [0, 0, 0]; // 各リールの現在のピクセル位置
    const reelAnimFrames = [null, null, null];
    const TOTAL_STRIP_H = SYMBOLS.length * REEL_ITEM_H; // 1周分の高さ
    const REEL_SPEEDS = [4, 5, 6]; // 各リールの速度（ピクセル/フレーム）、右ほど速い

    function getReelCenterIndex(reelIdx) {
      // 中央の窓に表示されている絵柄インデックスを返す
      const pos = reelPositions[reelIdx] % TOTAL_STRIP_H;
      return Math.round(pos / REEL_ITEM_H) % SYMBOLS.length;
    }

    // --- リール回転開始 ---
    function startSpin() {
      if (self._destroyed) return;
      currentTry++;
      tryDiv.textContent = currentTry + '回目 / ' + TOTAL_TRIES + '回';
      spinning = true;
      reelStopped = [false, false, false];
      resultDiv.textContent = '';

      // 各リールをランダム開始位置に
      for (let i = 0; i < 3; i++) {
        reelPositions[i] = Math.floor(Math.random() * SYMBOLS.length) * REEL_ITEM_H;
        reelValues[i] = 0;
        reelWindows[i].label.textContent = '';
        reelWindows[i].window.style.borderColor = '#8d6e63';
      }

      playSE('se_spin.mp3');
      helpDiv.textContent = 'A=左  S=中  D=右  ボタンでリールを止めよう！';

      // リール回転アニメーション（上から下に流れる）
      for (let i = 0; i < 3; i++) {
        (function(idx) {
          function animate() {
            if (self._destroyed || reelStopped[idx]) return;
            reelPositions[idx] -= REEL_SPEEDS[idx];
            // ループ処理（負の値を正に戻す）
            if (reelPositions[idx] < 0) {
              reelPositions[idx] += TOTAL_STRIP_H;
            }
            reelStrips[idx].style.top = -reelPositions[idx] + 'px';
            reelAnimFrames[idx] = requestAnimationFrame(animate);
          }
          animate();
        })(i);
      }
    }

    // --- リール停止（最寄りの絵柄にスナップ） ---
    function stopReel(idx) {
      if (reelStopped[idx]) return;
      reelStopped[idx] = true;
      if (reelAnimFrames[idx]) cancelAnimationFrame(reelAnimFrames[idx]);
      playSE('se_stop.mp3');

      // 最寄りの絵柄位置にスナップ
      const snapped = Math.round(reelPositions[idx] / REEL_ITEM_H) * REEL_ITEM_H;
      reelPositions[idx] = snapped;
      reelStrips[idx].style.top = -snapped + 'px';

      // 中央の窓に表示されている絵柄を記録（上1つ分オフセット）
      reelValues[idx] = Math.round((snapped / REEL_ITEM_H) + 1) % SYMBOLS.length;

      reelWindows[idx].label.textContent = '停止！';
      reelWindows[idx].window.style.borderColor = '#43a047';

      // 止まった絵柄の鳴き声を再生
      playAudio(SYMBOL_VOICE[reelValues[idx]]);

      // 全リール停止したか確認
      if (reelStopped[0] && reelStopped[1] && reelStopped[2]) {
        judgeSpin();
      }
    }

    // --- 判定 ---
    function judgeSpin() {
      spinning = false;
      const s0 = reelValues[0], s1 = reelValues[1], s2 = reelValues[2];
      let points = 0;
      let msg = '';

      if (s0 === s1 && s1 === s2) {
        // 3つ揃い: 基本点 × 絵柄倍率
        const mult = SYMBOL_MULT[s0];
        points = BASE_3MATCH * mult;
        msg = SYMBOLS[s0] + ' 3つ揃い！ ×' + mult + ' +' + points + '点';
        playSE('se_bigwin.mp3');
        setTimeout(function() { playSE('se_jackpot.mp3'); }, 300);

        // 枠を金色に
        for (let i = 0; i < 3; i++) {
          reelWindows[i].window.style.borderColor = '#ffd700';
          reelWindows[i].window.style.boxShadow = '0 0 20px rgba(255,215,0,0.6)';
        }
      } else if (s0 === s1 || s1 === s2 || s0 === s2) {
        // 2つ揃い: 揃った絵柄の倍率で加点
        const matchIdx = s0 === s1 ? s0 : s1 === s2 ? s1 : s0;
        const mult = SYMBOL_MULT[matchIdx];
        points = BASE_2MATCH * mult;
        msg = SYMBOLS[matchIdx] + ' 2つ揃い！ ×' + mult + ' +' + points + '点';
        playSE('se_jackpot.mp3');
      } else {
        // バラバラ
        points = 10;
        msg = 'バラバラ... +10点';
      }

      totalScore += points;
      tryScores.push(points);
      scoreDiv.textContent = totalScore + '点';
      resultDiv.textContent = msg;
      resultDiv.style.color = points >= 300 ? '#ffd700' : points >= 100 ? '#43a047' : '#999';

      helpDiv.textContent = '';

      // 次の挑戦 or ゲーム終了
      if (currentTry < TOTAL_TRIES) {
        helpDiv.textContent = '次の挑戦まで少し待ってね...';
        const t = setTimeout(function() {
          if (!self._destroyed) {
            // 枠をリセット
            for (let i = 0; i < 3; i++) {
              reelWindows[i].window.style.boxShadow = 'none';
            }
            startSpin();
          }
        }, 2500);
        self._timers.push(t);
      } else {
        // ゲーム終了
        helpDiv.textContent = '';
        const t = setTimeout(function() {
          if (self._destroyed) return;
          showFinalResult();
        }, 2500);
        self._timers.push(t);
      }
    }

    // --- 最終結果 ---
    function showFinalResult() {
      onGameKey = null;
      // リールアニメーションをクリア
      for (let i = 0; i < 3; i++) {
        if (reelAnimFrames[i]) cancelAnimationFrame(reelAnimFrames[i]);
      }

      playSE('se_finish.mp3');

      let detailHtml = '<div style="display:flex;gap:24px;margin-top:10px;">';
      for (let i = 0; i < tryScores.length; i++) {
        const color = tryScores[i] >= 300 ? '#ffd700' : tryScores[i] >= 100 ? '#43a047' : '#999';
        detailHtml += '<div style="font-size:30px;font-weight:700;color:' + color + ';">' + (i+1) + '回目: ' + tryScores[i] + '点</div>';
      }
      detailHtml += '</div>';

    this._timers.forEach(function(t) { clearTimeout(t); });

    this._intervals = [];

            </div>
          </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;max-width:1000px;">
          <div id="jw-hint" style="font-size:40px;font-weight:700;color:#b07010;text-align:center;min-height:60px;"></div>
          <div style="display:flex;align-items:center;justify-content:center;gap:80px;min-height:180px;">
            <div style="text-align:center;">
              <div style="font-size:28px;color:#d4880a;margin-bottom:8px;">ライオン</div>
              <div id="jw-enemy-hand" style="font-size:120px;opacity:0;">✊</div>
            </div>
            <div style="font-size:56px;font-weight:900;color:#999;">VS</div>
            <div style="text-align:center;">
              <div style="font-size:28px;color:#1e88e5;margin-bottom:8px;">あなた</div>
              <div id="jw-my-hand" style="font-size:120px;opacity:0;">✊</div>
            </div>
          </div>
          <div id="jw-result-text" style="font-size:48px;font-weight:900;min-height:65px;text-align:center;"></div>
          <div id="jw-instruction" style="font-size:36px;color:#3a6a1a;min-height:50px;text-align:center;"></div>

          <div style="flex:1;">
            <div style="font-size:32px;font-weight:900;margin-bottom:8px;color:#1e88e5;">あなた</div>
            <div style="background:#ddd;border-radius:16px;height:48px;width:100%;position:relative;overflow:hidden;border:3px solid #0d47a1;">
              <div id="jw-my-hp-bar" style="background:linear-gradient(90deg,#42a5f5,#1e88e5);height:100%;width:100%;border-radius:12px;transition:width 0.5s ease;"></div>
              <div id="jw-my-hp-text" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,0.5);">HP 100/100</div>
            </div>
          </div>
        </div>
      </div>`;

    const enemyHPBar = document.getElementById('jw-enemy-hp-bar');

    const myHPText = document.getElementById('jw-my-hp-text');

    const myHandEl = document.getElementById('jw-my-hand');
    const resultTextEl = document.getElementById('jw-result-text');
    const instructionEl = document.getElementById('jw-instruction');

    function updateHPDisplay() {
      const ePct = Math.max(0, enemyHP) / 100 * 100;
      const mPct = Math.max(0, myHP) / 100 * 100;
      enemyHPBar.style.width = ePct + '%';
      enemyHPText.textContent = 'HP ' + Math.max(0, enemyHP) + '/100';
      myHPBar.style.width = mPct + '%';
      myHPText.textContent = 'HP ' + Math.max(0, myHP) + '/100';
      if (ePct <= 30) enemyHPBar.style.background = 'linear-gradient(90deg,#b71c1c,#e53935)';
      if (mPct <= 30) myHPBar.style.background = 'linear-gradient(90deg,#0d47a1,#1565c0)';
    }

    function addTimer(fn, ms) {
      const id = setTimeout(function() {
        if (!self._active) return;
        fn();
      }, ms);
      self._timers.push(id);
      return id;
    }

    function startTurn() {
      if (gameEnded || !self._active) return;
      const enemyHand = HANDS[Math.floor(Math.random() * 3)];
      const isCorrectHint = Math.random() < 0.7;
      let hintHand = enemyHand;
      if (!isCorrectHint) {
        const others = HANDS.filter(function(h) { return h !== enemyHand; });
        hintHand = others[Math.floor(Math.random() * others.length)];
      }
      const hintMessages = HINTS[hintHand];
      const hintMsg = hintMessages[Math.floor(Math.random() * hintMessages.length)];

      enemyHandEl.style.opacity = '0';
      myHandEl.style.opacity = '0';
      resultTextEl.textContent = '';
      resultTextEl.style.color = '#333';
      hintEl.textContent = '';
      instructionEl.textContent = '';

      addTimer(function() {
        if (!self._active) return;
        hintEl.textContent = hintMsg;
        playSE('se_janken.mp3');
        addTimer(function() {
          if (!self._active) return;
          instructionEl.textContent = 'グー(A)・チョキ(S)・パー(D) で出そう！';
          instructionEl.style.animation = 'pulse 2s ease infinite';
          waitingForInput = true;
        }, 1500);
      }, 800);

      onGameKey = function(key) {
        if (!waitingForInput || gameEnded || !self._active) return;
        waitingForInput = false;
        onGameKey = null;
        instructionEl.textContent = '';
        instructionEl.style.animation = '';

        var myHand = key;
        myHandEl.textContent = HAND_EMOJI[myHand];
        myHandEl.style.opacity = '1';

        addTimer(function() {
          if (!self._active) return;
          enemyHandEl.textContent = HAND_EMOJI[enemyHand];
          enemyHandEl.style.opacity = '1';

          var result = judge(myHand, enemyHand);

          addTimer(function() {
            if (!self._active) return;
            if (result === 'win') {
              resultTextEl.textContent = '勝ち！ ライオンに20ダメージ！';
              resultTextEl.style.color = '#1e88e5';
              enemyHP -= 20;
              totalDamageDealt += 20;
              playSE('se_win.mp3');
              addTimer(function() { playSE('se_hit.mp3'); }, 300);
            } else if (result === 'lose') {
              resultTextEl.textContent = '負け... 15ダメージ受けた！';
              resultTextEl.style.color = '#e53935';
              myHP -= 15;
              playSE('se_lose.mp3');
              addTimer(function() { playSE('se_hit.mp3'); }, 300);
            } else {
              resultTextEl.textContent = 'あいこ！ お互いに5ダメージ！';
              resultTextEl.style.color = '#ff9800';
              enemyHP -= 5;
              myHP -= 5;
              totalDamageDealt += 5;
              playSE('se_draw.mp3');
            }
            updateHPDisplay();

            addTimer(function() {
              if (!self._active) return;
              if (enemyHP <= 0 || myHP <= 0) {
                endGame();
              } else {
                startTurn();
              }
            }, 2000);
          }, 500);
        }, 800);
      };
    }

    function endGame() {
      if (gameEnded) return;
      gameEnded = true;
      onGameKey = null;

      var score;
      if (enemyHP <= 0) {
        score = Math.max(0, myHP) * 10;
        resultTextEl.textContent = '勝利！！';
        resultTextEl.style.color = '#ffd700';
        resultTextEl.style.fontSize = '64px';
        hintEl.textContent = '';
        instructionEl.textContent = 'すごい！ ライオンに勝った！';
        instructionEl.style.color = '#d4880a';
        playSE('se_victory.mp3');
      } else {
        score = totalDamageDealt;
        resultTextEl.textContent = '惜しい...！';
        resultTextEl.style.color = '#e53935';
        resultTextEl.style.fontSize = '64px';
        hintEl.textContent = '';
        instructionEl.textContent = '与えたダメージ: ' + totalDamageDealt;
        instructionEl.style.color = '#999';
        playSE('se_defeat.mp3');
      }

      addTimer(function() {
        if (!self._active) return;
        onComplete(score);
      }, 3000);
    }

    addTimer(function() { startTurn(); }, 1000);
  },
  cleanup: function() {
    this._active = false;
    if (this._timers) {
      this._timers.forEach(function(id) { clearTimeout(id); });
      this._timers = [];
    }
    onGameKey = null;
  }
});

        if (timeLeft < 0) timeLeft = 0;
        timerBarEl.style.width = (timeLeft / 15 * 100) + '%';
        timerTextEl.textContent = '残り ' + timeLeft + '秒';
        if (timeLeft <= 5) {
          timerBarEl.style.background = 'linear-gradient(90deg,#e53935,#ff7043)';
          timerTextEl.style.color = '#e53935';
          if (!warningPlayed) {
            warningPlayed = true;
            playSE('se_timewarning.mp3');
          }
        }
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          if (waitingForInput) {
            waitingForInput = false;
            onGameKey = null;
            handleAnswer(-1);
          }
        }
      }, 1000);
      self._intervals.push(timerInterval);

      instructionEl.textContent = 'A・S・D で答えを選ぼう！';
      waitingForInput = true;

      onGameKey = function(key) {
        if (!waitingForInput || gameEnded || !self._active) return;
        waitingForInput = false;
        onGameKey = null;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        var chosen = key === 'a' ? 0 : key === 's' ? 1 : 2;
        handleAnswer(chosen);
      };
    }

    function handleAnswer(chosen) {
      if (!self._active) return;
      var q = questions[currentQ];
      instructionEl.textContent = '';

      for (var i = 0; i < 3; i++) {
        var el = document.getElementById('qq-choice-' + i);
        if (!el) continue;
        if (i === q.answer) {
          el.style.transform = 'scale(1.1)';
          el.style.boxShadow = '0 0 20px rgba(76,175,80,0.7)';
          el.style.border = '4px solid #2e7d32';
        } else {
          el.style.opacity = '0.4';
        }
      }

      if (chosen === q.answer) {
        correctCount++;
        feedbackEl.textContent = '⭕ 正解！';
        feedbackEl.style.color = '#2e7d32';
        playSE('se_correct.mp3');
        triviaEl.textContent = q.trivia;
      } else if (chosen === -1) {
        feedbackEl.textContent = '⏰ 時間切れ！';
        feedbackEl.style.color = '#e53935';
        playSE('se_wrong.mp3');
        triviaEl.textContent = '正解は「' + q.choices[q.answer] + '」でした。' + q.trivia;
      } else {
        feedbackEl.textContent = '❌ 残念！';
        feedbackEl.style.color = '#e53935';
        playSE('se_wrong.mp3');
        triviaEl.textContent = '正解は「' + q.choices[q.answer] + '」でした。' + q.trivia;
      }

      scoreDisplayEl.textContent = '正解: ' + correctCount + '問';
      currentQ++;

      addTimer(function() {
        showQuestion();
      }, 3500);
    }

    function endQuiz() {
      gameEnded = true;
      onGameKey = null;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      var score = correctCount * 100;

      questionEl.textContent = 'クイズ終了！';
      choicesEl.innerHTML = '';
      timerBarEl.style.width = '0%';
      timerTextEl.textContent = '';
      progressEl.textContent = '';
      feedbackEl.textContent = correctCount + '問正解 (' + score + '点)';
      feedbackEl.style.color = '#b08540';
      feedbackEl.style.fontSize = '52px';
      triviaEl.textContent = '';
      instructionEl.textContent = '';

      addTimer(function() {
        if (!self._active) return;
        onComplete(score);
      }, 2500);
    }

    addTimer(function() { showQuestion(); }, 800);
  },
  cleanup: function() {
    this._active = false;
    if (this._timers) {
      this._timers.forEach(function(id) { clearTimeout(id); });
      this._timers = [];
    }
    if (this._intervals) {
      this._intervals.forEach(function(id) { clearInterval(id); });
      this._intervals = [];
    }
    onGameKey = null;
  }
});

registerGame('race', {
  name: 'かけっこレース',
  animal: 'rabbit',
  description: 'グー、チョキ、パーの順番にボタンを押して走ろう！',
  introVoice: 'audio/intro_race.wav',
  medalThresholds: { gold: 2500, silver: 2000, bronze: 0 },
  _timers: [],
  _intervals: [],
  _active: false,
  _raf: null,
  init: function(gameArea, onComplete) {
    var self = this;
    self._timers = [];
    self._intervals = [];
    self._active = true;
    self._raf = null;

    var TOTAL_STEPS = 30;
    var SEQUENCE = ['a', 's', 'd'];
    var SEQ_NAMES = { a: 'グー (A)', s: 'チョキ (S)', d: 'パー (D)' };
    var SEQ_EMOJI = { a: '✊', s: '✌️', d: '✋' };
    var SEQ_COLORS = { a: '#e53935', s: '#fbc02d', d: '#1e88e5' };
    var SEQ_TEXT_COLORS = { a: '#fff', s: '#3a2a1a', d: '#fff' };

    var mySteps = 0;
    var seqIndex = 0;
    var stumbling = false;
    var gameStarted = false;
    var gameEnded = false;
    var startTime = 0;
    var finishTime = 0;

    // CPU rival: finishes in ~20 seconds
    var CPU_FINISH_MS = 20000;
    var cpuProgress = 0; // 0..1

    var trackWidth = 1400;
    var trackLeft = 260;

    gameArea.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;width:100%;height:100%;padding:20px 40px;position:relative;">' +
      '<div style="font-size:36px;font-weight:900;color:#e05080;margin-bottom:10px;">かけっこレース</div>' +
      '<div id="rc-timer" style="font-size:56px;font-weight:900;color:#3a2a1a;margin-bottom:16px;">0.00秒</div>' +
      '<!-- Track area -->' +
      '<div style="position:relative;width:100%;max-width:1800px;height:220px;margin-bottom:20px;">' +
        '<!-- Track background -->' +
        '<div style="position:absolute;top:0;left:' + (trackLeft - 10) + 'px;width:' + (trackWidth + 20) + 'px;height:220px;background:#d2b48c;border-radius:20px;border:3px solid #a0804a;"></div>' +
        '<!-- Lane lines -->' +
        '<div style="position:absolute;top:108px;left:' + trackLeft + 'px;width:' + trackWidth + 'px;height:4px;background:rgba(255,255,255,0.5);"></div>' +
        '<!-- Start line -->' +
        '<div style="position:absolute;top:10px;left:' + trackLeft + 'px;width:6px;height:200px;background:#333;border-radius:3px;"></div>' +
        '<div style="position:absolute;top:-15px;left:' + (trackLeft - 30) + 'px;font-size:28px;color:#333;font-weight:700;">START</div>' +
        '<!-- Goal line -->' +
        '<div style="position:absolute;top:10px;left:' + (trackLeft + trackWidth) + 'px;width:6px;height:200px;background:#e53935;border-radius:3px;"></div>' +
        '<div style="position:absolute;top:-15px;left:' + (trackLeft + trackWidth - 20) + 'px;font-size:28px;color:#e53935;font-weight:700;">GOAL</div>' +
        '<!-- Step markers -->' +
        '<div id="rc-step-markers" style="position:absolute;top:90px;left:' + trackLeft + 'px;width:' + trackWidth + 'px;height:4px;">' +
        '</div>' +
        '<!-- Player (top lane) -->' +
        '<div id="rc-player" style="position:absolute;top:20px;left:' + trackLeft + 'px;transition:left 0.15s ease;display:flex;flex-direction:column;align-items:center;">' +
          '<div style="font-size:28px;font-weight:700;color:#e05080;margin-bottom:4px;">あなた</div>' +
          '<div style="transform:scale(0.6);transform-origin:top center;">' + getAnimalSVG('rabbit', 100) + '</div>' +
        '</div>' +
        '<!-- CPU (bottom lane) -->' +
        '<div id="rc-cpu" style="position:absolute;top:120px;left:' + trackLeft + 'px;transition:left 0.1s linear;display:flex;flex-direction:column;align-items:center;">' +
          '<div style="font-size:28px;font-weight:700;color:#ff9800;margin-bottom:4px;">ライバル</div>' +
          '<div style="transform:scale(0.5);transform-origin:top center;">' + getAnimalSVG('cheetah', 100) + '</div>' +
        '</div>' +
      '</div>' +
      '<!-- Progress bar -->' +
      '<div style="width:100%;max-width:1400px;margin-bottom:16px;">' +
        '<div style="display:flex;justify-content:space-between;font-size:28px;font-weight:700;color:#555;margin-bottom:4px;">' +
          '<span>進行: <span id="rc-steps-display">0</span> / ' + TOTAL_STEPS + ' 歩</span>' +
          '<span id="rc-stumble-msg" style="color:#e53935;min-width:200px;text-align:right;"></span>' +
        '</div>' +
        '<div style="background:#ddd;border-radius:12px;height:20px;overflow:hidden;border:2px solid #aaa;">' +
          '<div id="rc-progress-bar" style="background:linear-gradient(90deg,#e05080,#f48fb1);height:100%;width:0%;border-radius:10px;transition:width 0.15s ease;"></div>' +
        '</div>' +
      '</div>' +
      '<!-- Next key display -->' +
      '<div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:10px;">' +
        '<div style="font-size:34px;color:#555;">次に押すボタン:</div>' +
        '<div id="rc-next-key" style="width:160px;height:160px;border-radius:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:64px;font-weight:900;box-shadow:0 8px 0 rgba(0,0,0,0.2);transition:transform 0.1s,background 0.2s;"></div>' +
        '<div id="rc-next-label" style="font-size:36px;font-weight:700;"></div>' +
      '</div>' +
      '<div id="rc-instruction" style="font-size:32px;color:#3a6a1a;margin-top:12px;"></div>' +
    '</div>';

    var timerEl = document.getElementById('rc-timer');
    var playerEl = document.getElementById('rc-player');
    var cpuEl = document.getElementById('rc-cpu');
    var stepsDisplay = document.getElementById('rc-steps-display');
    var stumbleMsg = document.getElementById('rc-stumble-msg');
    var progressBar = document.getElementById('rc-progress-bar');
    var nextKeyEl = document.getElementById('rc-next-key');
    var nextLabelEl = document.getElementById('rc-next-label');
    var instructionEl = document.getElementById('rc-instruction');

    function addTimer(fn, ms) {
      var id = setTimeout(function() {
        if (!self._active) return;
        fn();
      }, ms);
      self._timers.push(id);
      return id;
    }

    function updateNextKey() {
      var nextKey = SEQUENCE[seqIndex % 3];
      nextKeyEl.style.background = SEQ_COLORS[nextKey];
      nextKeyEl.style.color = SEQ_TEXT_COLORS[nextKey];
      nextKeyEl.textContent = SEQ_EMOJI[nextKey];
      nextLabelEl.textContent = SEQ_NAMES[nextKey];
      nextLabelEl.style.color = SEQ_COLORS[nextKey];
    }

    function updatePlayerPos() {
      var pct = mySteps / TOTAL_STEPS;
      var px = trackLeft + pct * trackWidth;
      playerEl.style.left = px + 'px';
      stepsDisplay.textContent = mySteps;
      progressBar.style.width = (pct * 100) + '%';
    }

    function updateCPUPos() {
      var px = trackLeft + cpuProgress * trackWidth;
      cpuEl.style.left = px + 'px';
    }

    function gameLoop() {
      if (!self._active || gameEnded) return;
      if (gameStarted) {
        var elapsed = performance.now() - startTime;
        timerEl.textContent = (elapsed / 1000).toFixed(2) + '秒';

        // CPU progress
        cpuProgress = Math.min(1, elapsed / CPU_FINISH_MS);
        updateCPUPos();

        // Check if CPU finished
        if (cpuProgress >= 1 && mySteps < TOTAL_STEPS) {
          // CPU finished first, but player keeps going
        }
      }
      self._raf = requestAnimationFrame(gameLoop);
    }

    // Countdown then start
    instructionEl.textContent = '準備...';
    nextKeyEl.style.background = '#ccc';
    nextKeyEl.textContent = '';
    nextLabelEl.textContent = '';

    addTimer(function() {
      if (!self._active) return;
      instructionEl.textContent = 'よーい...';
      addTimer(function() {
        if (!self._active) return;
        instructionEl.textContent = 'スタート！';
        instructionEl.style.color = '#e53935';
        instructionEl.style.fontSize = '44px';
        gameStarted = true;
        startTime = performance.now();
        updateNextKey();
        playSE('se_start.mp3');
        gameLoop();

        addTimer(function() {
          if (!self._active) return;
          instructionEl.textContent = '順番通りにボタンを押そう！';
          instructionEl.style.color = '#3a6a1a';
          instructionEl.style.fontSize = '32px';
        }, 1500);
      }, 1200);
    }, 1000);

    onGameKey = function(key) {
      if (!gameStarted || gameEnded || !self._active) return;
      if (stumbling) return;

      var expectedKey = SEQUENCE[seqIndex % 3];
      if (key === expectedKey) {
        // Correct
        mySteps++;
        seqIndex++;
        playSE('se_step.mp3');
        stumbleMsg.textContent = '';
        updatePlayerPos();
        updateNextKey();

        // Bounce animation on key display
        nextKeyEl.style.transform = 'scale(1.15)';
        addTimer(function() {
          nextKeyEl.style.transform = 'scale(1)';
        }, 100);

        if (mySteps >= TOTAL_STEPS) {
          finishGame();
        }
      } else {
        // Wrong key - stumble
        stumbling = true;
        playSE('se_stumble.mp3');
        stumbleMsg.textContent = 'つまずいた！ (1秒ペナルティ)';
        nextKeyEl.style.transform = 'scale(0.9) rotate(10deg)';
        playerEl.style.transform = 'rotate(15deg)';

        addTimer(function() {
          if (!self._active) return;
          stumbling = false;
          stumbleMsg.textContent = '';
          nextKeyEl.style.transform = 'scale(1) rotate(0deg)';
          playerEl.style.transform = 'rotate(0deg)';
        }, 1000);
      }
    };

    function finishGame() {
      gameEnded = true;
      finishTime = performance.now() - startTime;
      onGameKey = null;
      if (self._raf) cancelAnimationFrame(self._raf);

      var finishSec = finishTime / 1000;
      timerEl.textContent = finishSec.toFixed(2) + '秒';
      timerEl.style.color = '#e53935';

      // Score: max(0, 3000 - finishTimeMs / 10)
      var score = Math.max(0, Math.round(3000 - finishTime / 10));

      var cpuFinished = cpuProgress >= 1;
      var beatCPU = !cpuFinished || (finishTime < CPU_FINISH_MS);

      nextKeyEl.style.background = '#4caf50';
      nextKeyEl.style.color = '#fff';
      nextKeyEl.textContent = '🎉';
      nextLabelEl.textContent = 'ゴール！';
      nextLabelEl.style.color = '#4caf50';

      playSE('se_goal.mp3');
      if (beatCPU) {
        addTimer(function() { playSE('se_victory.mp3'); }, 500);
        instructionEl.textContent = 'ライバルに勝った！ タイム: ' + finishSec.toFixed(2) + '秒';
        instructionEl.style.color = '#e05080';
        instructionEl.style.fontSize = '40px';
      } else {
        instructionEl.textContent = 'ゴール！ タイム: ' + finishSec.toFixed(2) + '秒';
        instructionEl.style.color = '#555';
        instructionEl.style.fontSize = '40px';
      }

      addTimer(function() {
        if (!self._active) return;
        onComplete(score);
      }, 3000);
    }
  },
  cleanup: function() {
    this._active = false;
    if (this._timers) {
      this._timers.forEach(function(id) { clearTimeout(id); });
      this._timers = [];
    }
    if (this._intervals) {
      this._intervals.forEach(function(id) { clearInterval(id); });
      this._intervals = [];
    }
    if (this._raf) {
      cancelAnimationFrame(this._raf);
      this._raf = null;
    }
    onGameKey = null;
  }
});

// ========================================
// 初期化
// ========================================
function init() {
  loadState();
  preloadAllAudio();
  switchScreen('title');
  addDecorations();
  // 初回表示: ページロード直後は自動再生がブロックされる場合があるのでtryする
  setTimeout(() => playAudio('audio/title.wav'), 500);
}

// 背景の雲装飾
function addDecorations() {
  const clouds = [
    { x: '5%', y: '8%', w: 120, h: 50 },
    { x: '25%', y: '3%', w: 160, h: 60 },
    { x: '60%', y: '6%', w: 140, h: 55 },
    { x: '80%', y: '2%', w: 100, h: 40 },
  ];

  clouds.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cloud';
    el.style.left = c.x;
    el.style.top = c.y;
    el.style.width = c.w + 'px';
    el.style.height = c.h + 'px';
    document.body.appendChild(el);
  });
}

// DOM準備完了で初期化
document.addEventListener('DOMContentLoaded', init);
